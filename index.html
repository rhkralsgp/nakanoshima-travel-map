<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>삿포로 여행 지도</title>

  <!-- Leaflet 지도 CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  >

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 12px;
      background: #f7f7f5;
      color: #272727;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Pretendard",
        "Apple SD Gothic Neo",
        "Noto Sans KR",
        Arial,
        sans-serif;
    }

    .container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      margin: 4px 0 6px;
      font-size: 24px;
    }

    .description {
      margin: 0 0 14px;
      color: #666;
      font-size: 14px;
      line-height: 1.6;
    }

    /* 입력 영역 */
    .add-form {
      margin-bottom: 16px;
      padding: 16px;
      border: 1px solid #ddd;
      border-radius: 14px;
      background: white;
    }

    .form-title {
      margin-bottom: 12px;
      font-size: 16px;
      font-weight: 700;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 10px;
    }

    .form-group label {
      color: #555;
      font-size: 13px;
      font-weight: 600;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: white;
      font-family: inherit;
      font-size: 14px;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: #0f766e;
      outline: none;
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
    }

    /* 색상 선택 영역 */
    .color-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .color-row select {
      flex: 1;
    }

    .color-preview {
      flex: 0 0 44px;
      width: 44px;
      height: 42px;
      border: 2px solid white;
      border-radius: 10px;
      background: #ea580c;
      box-shadow: 0 0 0 1px #ccc;
    }

    .submit-btn {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      background: #0f766e;
      color: white;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }

    .submit-btn:hover {
      opacity: 0.88;
    }

    .guide {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      background: #f4f4f2;
      color: #666;
      font-size: 12px;
      line-height: 1.65;
    }

    .guide strong {
      color: #333;
    }

    /* 지도 */
    #map {
      width: 100%;
      height: 650px;
      overflow: hidden;
      border: 1px solid #ccc;
      border-radius: 14px;
      background: #eee;
    }

    /* 지도 핀 */
    .custom-pin {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border: 3px solid white;
      border-radius: 50% 50% 50% 0;
      box-shadow: 0 3px 9px rgba(0, 0, 0, 0.35);
      transform: rotate(-45deg);
    }

    .custom-pin span {
      color: white;
      font-size: 15px;
      font-weight: 800;
      transform: rotate(45deg);
    }

    /*
      지도에 항상 표시되는 장소명 라벨
    */
    .place-name-label {
      padding: 4px 8px;
      border: 1px solid rgba(0, 0, 0, 0.18);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.94);
      color: #222;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.18);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    /*
      Leaflet 툴팁 기본 화살표 제거
    */
    .place-name-label::before {
      display: none;
    }

    /* 팝업 */
    .popup-box {
      min-width: 170px;
    }

    .popup-title {
      margin-bottom: 5px;
      font-size: 15px;
      font-weight: 700;
    }

    .popup-color {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 7px;
      color: #666;
      font-size: 11px;
    }

    .popup-color-dot {
      width: 10px;
      height: 10px;
      border: 1px solid rgba(0, 0, 0, 0.15);
      border-radius: 50%;
    }

    .popup-coords {
      margin-bottom: 7px;
      color: #777;
      font-size: 11px;
    }

    .popup-link {
      display: block;
      width: 100%;
      margin-top: 7px;
      padding: 7px 10px;
      border-radius: 6px;
      color: white !important;
      text-align: center;
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
    }

    .google-btn {
      background: #2563eb;
    }

    .notion-btn {
      background: #0f766e;
    }

    .delete-btn {
      display: block;
      width: 100%;
      margin-top: 7px;
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: white;
      color: #555;
      cursor: pointer;
      font-size: 12px;
    }

    .delete-btn:hover {
      background: #f3f3f3;
    }

    @media (max-width: 600px) {
      body {
        padding: 8px;
      }

      h1 {
        font-size: 21px;
      }

      #map {
        height: 520px;
      }

      .add-form {
        padding: 13px;
      }

      .place-name-label {
        padding: 3px 6px;
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <h1>📍 삿포로 여행 지도</h1>

    <p class="description">
      장소명, 핀 색상, 구글 지도 링크를 입력하면 지도에 장소명과 색상 핀이 표시됩니다.
    </p>

    <!-- 핀 추가 폼 -->
    <section class="add-form">
      <div class="form-title">핀 추가하기</div>

      <form id="pin-form">

        <div class="form-group">
          <label for="pin-name">장소명</label>

          <input
            type="text"
            id="pin-name"
            placeholder="예: 니조시장"
            required
          >
        </div>

        <!-- 핀 색상 선택 -->
        <div class="form-group">
          <label for="pin-color">핀 색상</label>

          <div class="color-row">
            <select id="pin-color">
              <option value="#ea580c">
                주황색
              </option>

              <option value="#dc2626">
                빨간색
              </option>

              <option value="#2563eb">
                파란색
              </option>

              <option value="#7c3aed">
                보라색
              </option>

              <option value="#db2777">
                분홍색
              </option>

              <option value="#16a34a">
                초록색
              </option>

              <option value="#0f766e">
                청록색
              </option>

              <option value="#111827">
                검정색
              </option>
            </select>

            <div
              id="color-preview"
              class="color-preview"
              aria-label="선택한 핀 색상"
            ></div>
          </div>
        </div>

        <div class="form-group">
          <label for="pin-google">
            구글 지도 링크
          </label>

          <input
            type="text"
            id="pin-google"
            placeholder="https://www.google.com/maps/place/..."
            required
          >
        </div>

        <div class="form-group">
          <label for="pin-notion">
            노션 토글 또는 블록 링크
          </label>

          <input
            type="url"
            id="pin-notion"
            placeholder="https://www.notion.so/..."
            required
          >
        </div>

        <button
          type="submit"
          class="submit-btn"
        >
          색상 핀 추가
        </button>
      </form>

      <div class="guide">
        <strong>링크가 등록되지 않을 때</strong><br>
        `maps.app.goo.gl`로 시작하는 짧은 링크는 크롬에서 먼저 여세요.
        장소 화면이 열린 다음 주소창의
        `google.com/maps/...` 긴 주소를 복사해 넣어야 합니다.
      </div>
    </section>

    <!-- 지도 -->
    <div id="map"></div>
  </main>

  <!-- Leaflet 지도 JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  ></script>

  <script>
    /*
      오도리역 중심 좌표
    */
    const odoriStation = [43.037876410406795, 141.3610037533418];

    /*
      고정 지도 생성
    */
    const map = L.map("map", {
      center: odoriStation,
      zoom: 17,

      zoomControl: false,
      dragging: false,
      scrollWheelZoom: false,
      doubleClickZoom: false,
      touchZoom: false,
      boxZoom: false,
      keyboard: false,

      attributionControl: true
    });

    /*
      OpenStreetMap 지도 표시
    */
    L.tileLayer(
      "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
      {
        maxZoom: 19,

        attribution:
          '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
      }
    ).addTo(map);

    /*
      선택한 색상으로 핀 아이콘 생성
    */
    function createPinIcon(color) {
      const safeColor =
        /^#[0-9a-fA-F]{6}$/.test(color)
          ? color
          : "#ea580c";

      return L.divIcon({
        className: "custom-pin-wrapper",

        html: `
          <div
            class="custom-pin"
            style="background:${safeColor};"
          >
            <span>●</span>
          </div>
        `,

        iconSize: [34, 34],
        iconAnchor: [17, 34],
        popupAnchor: [0, -34]
      });
    }

    /*
      HTML 특수문자 처리
    */
    function escapeHtml(text) {
      return String(text ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    /*
      구글 지도 URL에서 좌표 추출
    */
    function extractCoordinatesFromGoogleMapsUrl(inputUrl) {
      let decodedUrl = inputUrl.trim();

      try {
        decodedUrl =
          decodeURIComponent(decodedUrl);
      } catch (error) {
        console.warn(
          "URL 디코딩을 건너뜁니다.",
          error
        );
      }

      const patterns = [
        /*
          /@43.0573,141.3603,17z
        */
        /@(-?\d+(?:\.\d+)?),\s*(-?\d+(?:\.\d+)?)/,

        /*
          !3d43.0573!4d141.3603
        */
        /!3d(-?\d+(?:\.\d+)?).*?!4d(-?\d+(?:\.\d+)?)/,

        /*
          ?q=43.0573,141.3603
        */
        /[?&]q=(-?\d+(?:\.\d+)?),\s*(-?\d+(?:\.\d+)?)/,

        /*
          ?query=43.0573,141.3603
        */
        /[?&]query=(-?\d+(?:\.\d+)?),\s*(-?\d+(?:\.\d+)?)/,

        /*
          좌표만 붙여넣기
        */
        /^(-?\d+(?:\.\d+)?),\s*(-?\d+(?:\.\d+)?)$/
      ];

      for (const pattern of patterns) {
        const match =
          decodedUrl.match(pattern);

        if (!match) {
          continue;
        }

        const lat =
          Number.parseFloat(match[1]);

        const lng =
          Number.parseFloat(match[2]);

        if (
          Number.isFinite(lat) &&
          Number.isFinite(lng)
        ) {
          return {
            lat: lat,
            lng: lng
          };
        }
      }

      return null;
    }

    /*
      핀 자료 저장
    */
    function savePins(pins) {
      localStorage.setItem(
        "sapporoPinsFromGoogleMaps",
        JSON.stringify(pins)
      );
    }

    /*
      저장된 핀 자료 불러오기
    */
    function loadPins() {
      const savedPins =
        localStorage.getItem(
          "sapporoPinsFromGoogleMaps"
        );

      if (!savedPins) {
        return [];
      }

      try {
        return JSON.parse(savedPins);
      } catch (error) {
        console.error(
          "저장된 핀을 불러오지 못했습니다.",
          error
        );

        return [];
      }
    }

    /*
      지도에 표시된 마커 관리
    */
    const markerMap = new Map();

    /*
      핀 생성
    */
    function createMarker(pin) {
      /*
        기존 저장 데이터에는 색상이 없을 수 있으므로
        기본값을 주황색으로 설정
      */
      const pinColor =
        pin.color || "#ea580c";

      const marker = L.marker(
        [pin.lat, pin.lng],
        {
          icon: createPinIcon(pinColor),
          title: pin.name
        }
      ).addTo(map);

      /*
        장소명을 지도에 항상 표시
      */
      marker.bindTooltip(
        escapeHtml(pin.name),
        {
          permanent: true,
          direction: "right",
          offset: [16, -16],
          className: "place-name-label",
          opacity: 1
        }
      );

      const safeName =
        escapeHtml(pin.name);

      const safeGoogleUrl =
        escapeHtml(pin.googleUrl);

      const safeNotionUrl =
        escapeHtml(pin.notionUrl);

      const safeColor =
        /^#[0-9a-fA-F]{6}$/.test(pinColor)
          ? pinColor
          : "#ea580c";

      marker.bindPopup(`
        <div class="popup-box">
          <div class="popup-title">
            ${safeName}
          </div>
          ,
          {autoPan: false}

          <div class="popup-color">
            <span
              class="popup-color-dot"
              style="background:${safeColor};"
            ></span>

            선택한 핀 색상
          </div>

          <div class="popup-coords">
            ${pin.lat}, ${pin.lng}
          </div>

          <a
            href="${safeGoogleUrl}"
            target="_blank"
            rel="noopener noreferrer"
            class="popup-link google-btn"
          >
            구글 지도에서 열기
          </a>

          <a
            href="${safeNotionUrl}"
            target="_blank"
            rel="noopener noreferrer"
            class="popup-link notion-btn"
          >
            노션 설명으로 이동
          </a>

          <button
            type="button"
            class="delete-btn"
            onclick="deletePin('${pin.id}')"
          >
            이 핀 삭제
          </button>
        </div>
      `);

      markerMap.set(pin.id, marker);
    }

    /*
      핀 삭제
    */
    window.deletePin = function(pinId) {
      const shouldDelete =
        window.confirm(
          "이 핀을 지도에서 삭제할까요?"
        );

      if (!shouldDelete) {
        return;
      }

      const savedPins = loadPins();

      const updatedPins =
        savedPins.filter(
          (pin) => pin.id !== pinId
        );

      savePins(updatedPins);

      const marker =
        markerMap.get(pinId);

      if (marker) {
        map.removeLayer(marker);
        markerMap.delete(pinId);
      }
    };

    /*
      저장된 핀 불러오기
    */
    const existingPins = loadPins();

    existingPins.forEach((pin) => {
      createMarker(pin);
    });

    /*
      색상 선택 미리보기
    */
    const colorSelect =
      document.getElementById("pin-color");

    const colorPreview =
      document.getElementById("color-preview");

    function updateColorPreview() {
      colorPreview.style.background =
        colorSelect.value;
    }

    colorSelect.addEventListener(
      "change",
      updateColorPreview
    );

    updateColorPreview();

    /*
      폼 제출
    */
    document
      .getElementById("pin-form")
      .addEventListener(
        "submit",
        function(event) {
          event.preventDefault();

          const name =
            document
              .getElementById("pin-name")
              .value
              .trim();

          const color =
            document
              .getElementById("pin-color")
              .value;

          const googleUrl =
            document
              .getElementById("pin-google")
              .value
              .trim();

          const notionUrl =
            document
              .getElementById("pin-notion")
              .value
              .trim();

          /*
            구글 지도 링크에서 좌표 추출
          */
          const coordinates =
            extractCoordinatesFromGoogleMapsUrl(
              googleUrl
            );

          if (!coordinates) {
            if (
              googleUrl.includes(
                "maps.app.goo.gl"
              )
            ) {
              alert(
                "짧은 구글 지도 링크에서는 좌표를 읽을 수 없습니다.\n\n" +
                "1. 링크를 크롬에서 여세요.\n" +
                "2. 장소가 열린 뒤 주소창의 긴 google.com/maps 주소를 복사하세요.\n" +
                "3. 그 주소를 다시 입력해주세요."
              );
            } else {
              alert(
                "링크에서 위도와 경도를 찾지 못했습니다.\n\n" +
                "주소에 @위도,경도 또는 !3d위도!4d경도 정보가 들어 있는지 확인해주세요."
              );
            }

            return;
          }

          const lat =
            coordinates.lat;

          const lng =
            coordinates.lng;

          /*
            좌표 범위 확인
          */
          if (
            lat < -90 ||
            lat > 90 ||
            lng < -180 ||
            lng > 180
          ) {
            alert(
              "링크에서 읽은 좌표가 올바르지 않습니다."
            );

            return;
          }

          /*
            삿포로와 너무 먼 좌표 확인
          */
          if (
            lat < 42.5 ||
            lat > 43.5 ||
            lng < 140.5 ||
            lng > 142.0
          ) {
            const continueAnyway =
              window.confirm(
                "이 장소는 삿포로에서 멀리 떨어져 있는 것으로 보입니다.\n그래도 추가할까요?"
              );

            if (!continueAnyway) {
              return;
            }
          }

          const newPin = {
            id:
              Date.now().toString() +
              Math.random()
                .toString(16)
                .slice(2),

            name: name,
            color: color,
            googleUrl: googleUrl,
            notionUrl: notionUrl,
            lat: lat,
            lng: lng
          };

          const savedPins =
            loadPins();

          savedPins.push(newPin);

          savePins(savedPins);

          createMarker(newPin);

          /*
            새 핀의 팝업 열기
          */
          const newMarker =
            markerMap.get(newPin.id);

          if (newMarker) {
            newMarker.openPopup();
          }

          /*
            폼 초기화
          */
          this.reset();

          /*
            색상 선택 초기값을 주황색으로 복구
          */
          colorSelect.value =
            "#ea580c";

          updateColorPreview();
        }
      );
  </script>
</body>
</html>
