<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>삿포로 여행 지도 (나카노시마역 고정)</title>
  
  <!-- Leaflet 지도 CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  >
  
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 12px;
      background: #f7f7f5;
      color: #272727;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Pretendard",
        "Apple SD Gothic Neo",
        "Noto Sans KR",
        Arial,
        sans-serif;
    }

    .container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      margin: 4px 0 6px;
      font-size: 24px;
    }

    .description {
      margin: 0 0 14px;
      color: #666;
      font-size: 14px;
      line-height: 1.6;
    }

    /* 입력 영역 */
    .add-form {
      margin-bottom: 16px;
      padding: 16px;
      border: 1px solid #ddd;
      border-radius: 14px;
      background: white;
    }

    .form-title {
      margin-bottom: 12px;
      font-size: 16px;
      font-weight: 700;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 10px;
    }

    .form-group label {
      color: #555;
      font-size: 13px;
      font-weight: 600;
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: white;
      font-size: 14px;
    }

    .form-group input:focus, .form-group select:focus {
      border-color: #0f766e;
      outline: none;
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
    }

    .submit-btn {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      background: #0f766e;
      color: white;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }

    .submit-btn:hover {
      opacity: 0.88;
    }

    .guide {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      background: #f4f4f2;
      color: #666;
      font-size: 12px;
      line-height: 1.65;
    }

    .guide strong {
      color: #333;
    }

    /* 지도 */
    #map {
      width: 100%;
      height: 650px;
      overflow: hidden;
      border: 1px solid #ccc;
      border-radius: 14px;
      background: #eee;
    }

    /* 📍 지도 커스텀 핀 & 이름 라벨 스타일 */
    .custom-pin-container {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .custom-pin {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border: 2px solid white;
      border-radius: 50% 50% 50% 0;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.35);
      transform: rotate(-45deg);
      flex-shrink: 0;
    }

    .custom-pin span {
      color: white;
      font-size: 12px;
      font-weight: 800;
      transform: rotate(45deg);
    }

    /* 지도 상에 표시되는 장소 이름 태그 */
    .pin-label {
      background: rgba(255, 255, 255, 0.95);
      color: #222;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid #ddd;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.15);
      pointer-events: none;
    }

    /* 팝업 */
    .popup-box {
      min-width: 170px;
    }

    .popup-title {
      margin-bottom: 5px;
      font-size: 15px;
      font-weight: 700;
    }

    .popup-coords {
      margin-bottom: 7px;
      color: #777;
      font-size: 11px;
    }

    .popup-link {
      display: block;
      width: 100%;
      margin-top: 7px;
      padding: 7px 10px;
      border-radius: 6px;
      color: white !important;
      text-align: center;
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
    }

    .google-btn {
      background: #2563eb;
    }

    .notion-btn {
      background: #0f766e;
    }

    .delete-btn {
      display: block;
      width: 100%;
      margin-top: 7px;
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: white;
      color: #555;
      cursor: pointer;
      font-size: 12px;
    }

    .delete-btn:hover {
      background: #f3f3f3;
    }

    @media (max-width: 600px) {
      body {
        padding: 8px;
      }

      h1 {
        font-size: 21px;
      }

      #map {
        height: 520px;
      }

      .add-form {
        padding: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>📍 삿포로 여행 지도</h1>

    <p class="description">
      장소명과 구글 지도 링크를 입력하면 지도에 핀과 장소 이름이 바로 표시됩니다.
    </p>

    <!-- 핀 추가 폼 -->
    <section class="add-form">
      <div class="form-title">핀 추가하기</div>

      <form id="pin-form">
        <div class="form-group">
          <label for="pin-name">장소명</label>
          <input
            type="text"
            id="pin-name"
            placeholder="예: 나카노시마 공원"
            required
          >
        </div>

        <!-- 핀 색상 선택 -->
        <div class="form-group">
          <label for="pin-color">핀 색상</label>
          <select id="pin-color">
            <option value="#ea580c">🍊 주황색 (기본)</option>
            <option value="#2563eb">🔵 파란색 (관광/명소)</option>
            <option value="#16a34a">🟢 초록색 (공원/자연)</option>
            <option value="#9333ea">🟣 보라색 (쇼핑/숙소)</option>
            <option value="#dc2626">🔴 빨간색 (맛집/카페)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="pin-google">구글 지도 링크</label>
          <input
            type="text"
            id="pin-google"
            placeholder="https://www.google.com/maps/place/..."
            required
          >
        </div>

        <div class="form-group">
          <label for="pin-notion">노션 토글 또는 블록 링크</label>
          <input
            type="url"
            id="pin-notion"
            placeholder="https://www.notion.so/..."
            required
          >
        </div>

        <button type="submit" class="submit-btn">
          구글 지도 링크로 핀 추가
        </button>
      </form>

      <div class="guide">
        <strong>링크가 등록되지 않을 때</strong><br>
        `maps.app.goo.gl`로 시작하는 짧은 링크는 크롬에서 먼저 여세요.
        장소 화면이 열리면 주소창의 `google.com/maps/...` 긴 주소를 다시 복사해서 넣으면 됩니다.
      </div>
    </section>

    <!-- 지도 -->
    <div id="map"></div>
  </main>

  <!-- Leaflet 지도 JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <script>
    /* 📍 나카노시마역 중심 좌표 (위도: 43.0372, 경도: 141.3622) */
    const nakanoshimaStation = [43.0372, 141.3622];

    /* 고정 지도 생성 (이동 및 터치/확대 완전 차단) */
    const map = L.map("map", {
      center: nakanoshimaStation,
      zoom: 14,
      zoomControl: false,
      dragging: false,
      scrollWheelZoom: false,
      doubleClickZoom: false,
      touchZoom: false,
      boxZoom: false,
      keyboard: false,
      attributionControl: true
    });

    /* OpenStreetMap 지도 표시 */
    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    /* 커스텀 핀 아이콘 생성 함수 */
    function createCustomIcon(color, name) {
      const safeName = escapeHtml(name);
      return L.divIcon({
        className: "custom-pin-wrapper",
        html: `
          <div class="custom-pin-container">
            <div class="custom-pin" style="background: ${color};">
              <span>●</span>
            </div>
            <div class="pin-label">${safeName}</div>
          </div>
        `,
        iconSize: [120, 32],
        iconAnchor: [16, 32],
        popupAnchor: [0, -32]
      });
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function extractCoordinatesFromGoogleMapsUrl(inputUrl) {
      let decodedUrl = inputUrl.trim();
      try {
        decodedUrl = decodeURIComponent(decodedUrl);
      } catch (error) {
        console.warn("URL 디코딩 건너뜀", error);
      }

      const patterns = [
        /@(-?\d+(?:\.\d+)?),\s*(-?\d+(?:\.\d+)?)/,
        /!3d(-?\d+(?:\.\d+)?).*?!4d(-?\d+(?:\.\d+)?)/,
        /[?&]q=(-?\d+(?:\.\d+)?),\s*(-?\d+(?:\.\d+)?)/,
        /[?&]query=(-?\d+(?:\.\d+)?),\s*(-?\d+(?:\.\d+)?)/,
        /^(-?\d+(?:\.\d+)?),\s*(-?\d+(?:\.\d+)?)$/
      ];

      for (const pattern of patterns) {
        const match = decodedUrl.match(pattern);
        if (match) {
          const lat = Number.parseFloat(match[1]);
          const lng = Number.parseFloat(match[2]);
          if (Number.isFinite(lat) && Number.isFinite(lng)) {
            return { lat, lng };
          }
        }
      }
      return null;
    }

    function savePins(pins) {
      localStorage.setItem("sapporoPinsFromGoogleMaps", JSON.stringify(pins));
    }

    function loadPins() {
      const savedPins = localStorage.getItem("sapporoPinsFromGoogleMaps");
      if (!savedPins) return [];
      try {
        return JSON.parse(savedPins);
      } catch (error) {
        return [];
      }
    }

    const markerMap = new Map();

    /* 핀 하나를 지도에 생성 */
    function createMarker(pin) {
      const pinColor = pin.color || "#ea580c";
      const icon = createCustomIcon(pinColor, pin.name);

      const marker = L.marker([pin.lat, pin.lng], {
        icon: icon,
        title: pin.name
      }).addTo(map);

      const safeName = escapeHtml(pin.name);
      const safeGoogleUrl = escapeHtml(pin.googleUrl);
      const safeNotionUrl = escapeHtml(pin.notionUrl);

      /* 🔒 autoPan: false 설정으로 팝업이 열릴 때 지도가 움직이는 현상을 차단 */
      marker.bindPopup(`
        <div class="popup-box">
          <div class="popup-title">${safeName}</div>
          <div class="popup-coords">${pin.lat}, ${pin.lng}</div>
          <a href="${safeGoogleUrl}" target="_blank" rel="noopener noreferrer" class="popup-link google-btn">구글 지도에서 열기</a>
          <a href="${safeNotionUrl}" target="_blank" rel="noopener noreferrer" class="popup-link notion-btn">노션 설명으로 이동</a>
          <button type="button" class="delete-btn" onclick="deletePin('${pin.id}')">이 핀 삭제</button>
        </div>
      `, {
        autoPan: false
      });

      markerMap.set(pin.id, marker);
    }

    /* 핀 삭제 */
    window.deletePin = function(pinId) {
      if (!window.confirm("이 핀을 지도에서 삭제할까요?")) return;

      const savedPins = loadPins();
      const updatedPins = savedPins.filter((pin) => pin.id !== pinId);

      savePins(updatedPins);

      const marker = markerMap.get(pinId);
      if (marker) {
        map.removeLayer(marker);
        markerMap.delete(pinId);
      }
    };

    /* 기존 핀 로드 */
    const existingPins = loadPins();
    existingPins.forEach((pin) => createMarker(pin));

    /* 폼 제출 핸들러 */
    document.getElementById("pin-form").addEventListener("submit", function(event) {
      event.preventDefault();

      const name = document.getElementById("pin-name").value.trim();
      const color = document.getElementById("pin-color").value;
      const googleUrl = document.getElementById("pin-google").value.trim();
      const notionUrl = document.getElementById("pin-notion").value.trim();

      const coordinates = extractCoordinatesFromGoogleMapsUrl(googleUrl);

      if (!coordinates) {
        alert(googleUrl.includes("maps.app.goo.gl") 
          ? "구글 지도 앱의 짧은 링크는 크롬에서 연 후 긴 주소로 복사해주세요." 
          : "링크에서 좌표를 찾을 수 없습니다.");
        return;
      }

      const { lat, lng } = coordinates;

      const newPin = {
        id: Date.now().toString() + Math.random().toString(16).slice(2),
        name: name,
        color: color,
        googleUrl: googleUrl,
        notionUrl: notionUrl,
        lat: lat,
        lng: lng
      };

      const savedPins = loadPins();
      savedPins.push(newPin);
      savePins(savedPins);

      createMarker(newPin);

      /* 새 핀 추가 시 팝업만 열고 지도는 나카노시마역 위치 그대로 고정 */
      const newMarker = markerMap.get(newPin.id);
      if (newMarker) {
        newMarker.openPopup();
      }

      this.reset();
    });
  </script>
</body>
</html>
