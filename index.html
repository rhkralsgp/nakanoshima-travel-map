<!DOCTYPE html>

<html lang="ko">
<head>
  <meta charset="UTF-8">

<metaname="viewport"content="width=device-width, initial-scale=1.0"



이 코드에서 핀 찍을때 색이랑 이름 매겨서 지도에 그대로 표시되는 기능 추가해줘

  <title>삿포로 여행 지도</title>

  <!-- Leaflet 지도 CSS -->

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  >

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 12px;
      background: #f7f7f5;
      color: #272727;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Pretendard",
        "Apple SD Gothic Neo",
        "Noto Sans KR",
        Arial,
        sans-serif;
    }

    .container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      margin: 4px 0 6px;
      font-size: 24px;
    }

    .description {
      margin: 0 0 14px;
      color: #666;
      font-size: 14px;
      line-height: 1.6;
    }

    /* 입력 영역 */
    .add-form {
      margin-bottom: 16px;
      padding: 16px;
      border: 1px solid #ddd;
      border-radius: 14px;
      background: white;
    }

    .form-title {
      margin-bottom: 12px;
      font-size: 16px;
      font-weight: 700;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 10px;
    }

    .form-group label {
      color: #555;
      font-size: 13px;
      font-weight: 600;
    }

    .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: white;
      font-size: 14px;
    }

    .form-group input:focus {
      border-color: #0f766e;
      outline: none;
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
    }

    .submit-btn {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      background: #0f766e;
      color: white;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }

    .submit-btn:hover {
      opacity: 0.88;
    }

    .guide {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      background: #f4f4f2;
      color: #666;
      font-size: 12px;
      line-height: 1.65;
    }

    .guide strong {
      color: #333;
    }

    /* 지도 */
    #map {
      width: 100%;
      height: 650px;
      overflow: hidden;
      border: 1px solid #ccc;
      border-radius: 14px;
      background: #eee;
    }

    /* 지도 핀 */
    .custom-pin {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border: 3px solid white;
      border-radius: 50% 50% 50% 0;
      background: #ea580c;
      box-shadow: 0 3px 9px rgba(0, 0, 0, 0.35);
      transform: rotate(-45deg);
    }

    .custom-pin span {
      color: white;
      font-size: 15px;
      font-weight: 800;
      transform: rotate(45deg);
    }

    /* 팝업 */
    .popup-box {
      min-width: 170px;
    }

    .popup-title {
      margin-bottom: 5px;
      font-size: 15px;
      font-weight: 700;
    }

    .popup-coords {
      margin-bottom: 7px;
      color: #777;
      font-size: 11px;
    }

    .popup-link {
      display: block;
      width: 100%;
      margin-top: 7px;
      padding: 7px 10px;
      border-radius: 6px;
      color: white !important;
      text-align: center;
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
    }

    .google-btn {
      background: #2563eb;
    }

    .notion-btn {
      background: #0f766e;
    }

    .delete-btn {
      display: block;
      width: 100%;
      margin-top: 7px;
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: white;
      color: #555;
      cursor: pointer;
      font-size: 12px;
    }

    .delete-btn:hover {
      background: #f3f3f3;
    }

    @media (max-width: 600px) {
      body {
        padding: 8px;
      }

      h1 {
        font-size: 21px;
      }

      #map {
        height: 520px;
      }

      .add-form {
        padding: 13px;
      }
    }
  </style>

</head>

<body>
  <main class="container">
    <h1>📍 삿포로 여행 지도</h1>

<p class="description">
  장소명과 구글 지도 링크를 입력하면 링크에서 좌표를 읽어 지도에 핀을 표시합니다.
</p>

<!-- 핀 추가 폼 -->
<section class="add-form">
  <div class="form-title">핀 추가하기</div>

  <form id="pin-form">
    <div class="form-group">
      <label for="pin-name">장소명</label>

      <input
        type="text"
        id="pin-name"
        placeholder="예: 니조시장"
        required
      >
    </div>

    <div class="form-group">
      <label for="pin-google">
        구글 지도 링크
      </label>

      <input
        type="text"
        id="pin-google"
        placeholder="https://www.google.com/maps/place/..."
        required
      >
    </div>

    <div class="form-group">
      <label for="pin-notion">
        노션 토글 또는 블록 링크
      </label>

      <input
        type="url"
        id="pin-notion"
        placeholder="https://www.notion.so/..."
        required
      >
    </div>

    <button
      type="submit"
      class="submit-btn"
    >
      구글 지도 링크로 핀 추가
    </button>
  </form>

  <div class="guide">
    <strong>링크가 등록되지 않을 때</strong><br>
    `maps.app.goo.gl`로 시작하는 짧은 링크는 크롬에서 먼저 여세요.
    장소 화면이 열리면 주소창의
    `google.com/maps/...` 긴 주소를 다시 복사해서 넣으면 됩니다.
  </div>
</section>

<!-- 지도 -->
<div id="map"></div>

  </main>

  <!-- Leaflet 지도 JS -->

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  ></script>

  <script>
    /*
      오도리역 중심 좌표
    */
    const odoriStation = [43.0609, 141.3545];

    /*
      고정 지도 생성

      이동, 확대, 축소를 모두 막아
      사진처럼 고정된 상태로 표시
    */
    const map = L.map("map", {
      center: odoriStation,
      zoom: 14,

      zoomControl: false,
      dragging: false,
      scrollWheelZoom: false,
      doubleClickZoom: false,
      touchZoom: false,
      boxZoom: false,
      keyboard: false,

      attributionControl: true
    });

    /*
      OpenStreetMap 지도 표시
    */
    L.tileLayer(
      "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
      {
        maxZoom: 19,
        attribution:
          '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
      }
    ).addTo(map);

    /*
      커스텀 핀 아이콘
    */
    const customPinIcon = L.divIcon({
      className: "custom-pin-wrapper",

      html: `
        <div class="custom-pin">
          <span>●</span>
        </div>
      `,

      iconSize: [34, 34],
      iconAnchor: [17, 34],
      popupAnchor: [0, -34]
    });

    /*
      HTML에 특수문자가 들어가도
      화면이 깨지지 않게 처리
    */
    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    /*
      구글 지도 URL에서 좌표 추출

      지원하는 대표 주소 형식:

      /@43.0573,141.3603,17z

      !3d43.0573!4d141.3603

      ?q=43.0573,141.3603

      ?query=43.0573,141.3603
    */
    function extractCoordinatesFromGoogleMapsUrl(inputUrl) {
      let decodedUrl = inputUrl.trim();

      /*
        URL 안의 %2C 같은 값을 쉼표로 변환
      */
      try {
        decodedUrl = decodeURIComponent(decodedUrl);
      } catch (error) {
        console.warn(
          "URL 디코딩을 건너뜁니다.",
          error
        );
      }

      const patterns = [
        /*
          예:
          /@43.0573,141.3603,17z
        */
        /@(-?\d+(?:\.\d+)?),\s*(-?\d+(?:\.\d+)?)/,

        /*
          예:
          !3d43.0573!4d141.3603
        */
        /!3d(-?\d+(?:\.\d+)?).*?!4d(-?\d+(?:\.\d+)?)/,

        /*
          예:
          ?q=43.0573,141.3603
          &q=43.0573,141.3603
        */
        /[?&]q=(-?\d+(?:\.\d+)?),\s*(-?\d+(?:\.\d+)?)/,

        /*
          예:
          ?query=43.0573,141.3603
        */
        /[?&]query=(-?\d+(?:\.\d+)?),\s*(-?\d+(?:\.\d+)?)/,

        /*
          링크 대신 좌표만 붙여 넣어도 허용
          예: 43.0573, 141.3603
        */
        /^(-?\d+(?:\.\d+)?),\s*(-?\d+(?:\.\d+)?)$/
      ];

      for (const pattern of patterns) {
        const match = decodedUrl.match(pattern);

        if (!match) {
          continue;
        }

        const lat = Number.parseFloat(match[1]);
        const lng = Number.parseFloat(match[2]);

        if (
          Number.isFinite(lat) &&
          Number.isFinite(lng)
        ) {
          return {
            lat: lat,
            lng: lng
          };
        }
      }

      return null;
    }

    /*
      핀 자료를 브라우저에 저장
    */
    function savePins(pins) {
      localStorage.setItem(
        "sapporoPinsFromGoogleMaps",
        JSON.stringify(pins)
      );
    }

    /*
      저장된 핀 자료 불러오기
    */
    function loadPins() {
      const savedPins =
        localStorage.getItem(
          "sapporoPinsFromGoogleMaps"
        );

      if (!savedPins) {
        return [];
      }

      try {
        return JSON.parse(savedPins);
      } catch (error) {
        console.error(
          "저장된 핀을 불러오지 못했습니다.",
          error
        );

        return [];
      }
    }

    /*
      지도에 표시된 마커 관리
    */
    const markerMap = new Map();

    /*
      핀 하나를 지도에 생성
    */
    function createMarker(pin) {
      const marker = L.marker(
        [pin.lat, pin.lng],
        {
          icon: customPinIcon,
          title: pin.name
        }
      ).addTo(map);

      const safeName =
        escapeHtml(pin.name);

      const safeGoogleUrl =
        escapeHtml(pin.googleUrl);

      const safeNotionUrl =
        escapeHtml(pin.notionUrl);

      marker.bindPopup(`
        <div class="popup-box">
          <div class="popup-title">
            ${safeName}
          </div>

          <div class="popup-coords">
            ${pin.lat}, ${pin.lng}
          </div>

          <a
            href="${safeGoogleUrl}"
            target="_blank"
            rel="noopener noreferrer"
            class="popup-link google-btn"
          >
            구글 지도에서 열기
          </a>

          <a
            href="${safeNotionUrl}"
            target="_blank"
            rel="noopener noreferrer"
            class="popup-link notion-btn"
          >
            노션 설명으로 이동
          </a>

          <button
            type="button"
            class="delete-btn"
            onclick="deletePin('${pin.id}')"
          >
            이 핀 삭제
          </button>
        </div>
      `);

      markerMap.set(pin.id, marker);
    }

    /*
      핀 삭제
    */
    window.deletePin = function(pinId) {
      const shouldDelete =
        window.confirm(
          "이 핀을 지도에서 삭제할까요?"
        );

      if (!shouldDelete) {
        return;
      }

      const savedPins = loadPins();

      const updatedPins =
        savedPins.filter(
          (pin) => pin.id !== pinId
        );

      savePins(updatedPins);

      const marker =
        markerMap.get(pinId);

      if (marker) {
        map.removeLayer(marker);
        markerMap.delete(pinId);
      }
    };

    /*
      기존에 저장된 핀 불러오기
    */
    const existingPins = loadPins();

    existingPins.forEach((pin) => {
      createMarker(pin);
    });

    /*
      입력 폼 제출
    */
    document
      .getElementById("pin-form")
      .addEventListener(
        "submit",
        function(event) {
          event.preventDefault();

          const name =
            document
              .getElementById("pin-name")
              .value
              .trim();

          const googleUrl =
            document
              .getElementById("pin-google")
              .value
              .trim();

          const notionUrl =
            document
              .getElementById("pin-notion")
              .value
              .trim();

          /*
            구글 지도 링크에서 좌표 추출
          */
          const coordinates =
            extractCoordinatesFromGoogleMapsUrl(
              googleUrl
            );

          if (!coordinates) {
            if (
              googleUrl.includes(
                "maps.app.goo.gl"
              )
            ) {
              alert(
                "구글 지도 앱의 짧은 링크에서는 좌표를 읽을 수 없습니다.\n\n" +
                "1. 이 링크를 크롬에서 여세요.\n" +
                "2. 장소가 열린 뒤 주소창의 긴 google.com/maps 주소를 복사하세요.\n" +
                "3. 그 주소를 다시 입력해주세요."
              );
            } else {
              alert(
                "링크에서 위도와 경도를 찾지 못했습니다.\n\n" +
                "주소에 @위도,경도 또는 !3d위도!4d경도 정보가 들어 있는지 확인해주세요."
              );
            }

            return;
          }

          const lat = coordinates.lat;
          const lng = coordinates.lng;

          /*
            위·경도 기본 범위 확인
          */
          if (
            lat < -90 ||
            lat > 90 ||
            lng < -180 ||
            lng > 180
          ) {
            alert(
              "링크에서 읽은 좌표가 올바르지 않습니다."
            );

            return;
          }

          /*
            삿포로와 너무 먼 곳이면 확인
          */
          if (
            lat < 42.5 ||
            lat > 43.5 ||
            lng < 140.5 ||
            lng > 142.0
          ) {
            const continueAnyway =
              window.confirm(
                "이 장소는 삿포로에서 멀리 떨어져 있는 것으로 보입니다.\n그래도 추가할까요?"
              );

            if (!continueAnyway) {
              return;
            }
          }

          const newPin = {
            id:
              Date.now().toString() +
              Math.random()
                .toString(16)
                .slice(2),

            name: name,
            googleUrl: googleUrl,
            notionUrl: notionUrl,
            lat: lat,
            lng: lng
          };

          const savedPins = loadPins();

          savedPins.push(newPin);

          savePins(savedPins);

          createMarker(newPin);

          /*
            지도는 고정하고 새 핀의 팝업만 표시
          */
          const newMarker =
            markerMap.get(newPin.id);

          if (newMarker) {
            newMarker.openPopup();
          }

          this.reset();
        }
      );
  </script>

</body>
</html>
