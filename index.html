<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>나카노시마 여행 지도</title>

  <!-- Leaflet 지도 CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  >

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      padding: 12px;
      background: #f7f7f5;
      color: #272727;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Pretendard",
        "Apple SD Gothic Neo",
        "Noto Sans KR",
        Arial,
        sans-serif;
    }

    .container {
      width: 100%;
      max-width: 950px;
      margin: 0 auto;
    }

    h1 {
      margin: 4px 0 6px;
      font-size: 24px;
    }

    .description {
      margin: 0 0 14px;
      color: #666;
      font-size: 14px;
      line-height: 1.6;
    }

    /* =========================
       입력 영역
    ========================= */

    .add-form {
      margin-bottom: 16px;
      padding: 16px;
      border: 1px solid #ddd;
      border-radius: 14px;
      background: white;
    }

    .form-title {
      margin-bottom: 12px;
      font-size: 16px;
      font-weight: 800;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 10px;
    }

    .form-group label {
      color: #555;
      font-size: 13px;
      font-weight: 700;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: white;
      font-family: inherit;
      font-size: 14px;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: #0f766e;
      outline: none;
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
    }

    /* 색상 선택 */
    .color-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .color-row select {
      flex: 1;
    }

    .color-preview {
      flex: 0 0 46px;
      width: 46px;
      height: 42px;
      border: 3px solid white;
      border-radius: 10px;
      background: #ea580c;
      box-shadow: 0 0 0 1px #bbb;
    }

    /* 버튼 */
    .button-row {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .submit-btn,
    .clear-btn {
      padding: 11px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 800;
    }

    .submit-btn {
      flex: 1;
      background: #0f766e;
      color: white;
    }

    .clear-btn {
      flex: 0 0 auto;
      background: #f1f1ef;
      color: #555;
    }

    .submit-btn:hover,
    .clear-btn:hover {
      opacity: 0.85;
    }

    .guide {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      background: #f4f4f2;
      color: #666;
      font-size: 12px;
      line-height: 1.65;
    }

    .guide strong {
      color: #333;
    }

    /* =========================
       범례
    ========================= */

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 12px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 9px;
      border: 1px solid #ddd;
      border-radius: 20px;
      background: white;
      color: #555;
      font-size: 12px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    /* =========================
       지도
    ========================= */

    #map {
      width: 100%;
      height: 650px;
      overflow: hidden;
      border: 1px solid #ccc;
      border-radius: 14px;
      background: #eee;
    }

    /* 지도 핀 */
    .custom-pin {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border: 3px solid white;
      border-radius: 50% 50% 50% 0;
      box-shadow: 0 3px 9px rgba(0, 0, 0, 0.35);
      transform: rotate(-45deg);
    }

    .custom-pin span {
      color: white;
      font-size: 13px;
      font-weight: 900;
      transform: rotate(45deg);
    }

    /* 나카노시마역 기준점 */
    .station-pin {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border: 3px solid white;
      border-radius: 50%;
      background: #111827;
      color: white;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.4);
      font-size: 12px;
      font-weight: 900;
    }

    /* 장소명 상시 표시 */
    .place-name-label {
      padding: 4px 8px;
      border: 1px solid rgba(0, 0, 0, 0.18);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.95);
      color: #222;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.18);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .place-name-label::before {
      display: none;
    }

    .station-label {
      padding: 4px 8px;
      border: none;
      border-radius: 7px;
      background: #111827;
      color: white;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.22);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .station-label::before {
      display: none;
    }

    /* =========================
       팝업
    ========================= */

    .popup-box {
      min-width: 180px;
      max-width: 230px;
    }

    .popup-title {
      margin-bottom: 5px;
      font-size: 15px;
      font-weight: 800;
      line-height: 1.4;
    }

    .popup-color {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 7px;
      color: #666;
      font-size: 11px;
    }

    .popup-color-dot {
      width: 10px;
      height: 10px;
      border: 1px solid rgba(0, 0, 0, 0.15);
      border-radius: 50%;
    }

    .popup-distance {
      margin-bottom: 7px;
      color: #555;
      font-size: 12px;
    }

    .popup-coords {
      margin-bottom: 7px;
      color: #888;
      font-size: 10px;
    }

    .popup-link {
      display: block;
      width: 100%;
      margin-top: 7px;
      padding: 8px 10px;
      border-radius: 7px;
      color: white !important;
      text-align: center;
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
    }

    .google-btn {
      background: #2563eb;
    }

    .notion-btn {
      background: #0f766e;
    }

    .delete-btn {
      display: block;
      width: 100%;
      margin-top: 7px;
      padding: 7px 10px;
      border: 1px solid #e2b4b4;
      border-radius: 7px;
      background: #fff5f5;
      color: #b91c1c;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
    }

    .delete-btn:hover {
      background: #fee2e2;
    }

    /* 저장된 핀 수 */
    .pin-count {
      margin: 10px 2px 0;
      color: #666;
      font-size: 12px;
      text-align: right;
    }

    @media (max-width: 600px) {
      body {
        padding: 8px;
      }

      h1 {
        font-size: 21px;
      }

      #map {
        height: 520px;
      }

      .add-form {
        padding: 13px;
      }

      .place-name-label,
      .station-label {
        padding: 3px 6px;
        font-size: 10px;
      }

      .button-row {
        flex-direction: column;
      }

      .clear-btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <h1>📍 나카노시마 여행 지도</h1>

    <p class="description">
      나카노시마역을 중심으로 반경 2km 안의 장소를 정리하는 지도입니다.
      핀 색상과 장소명이 지도에 계속 표시됩니다.
    </p>

    <!-- 핀 추가 폼 -->
    <section class="add-form">
      <div class="form-title">
        새 장소 핀 추가하기
      </div>

      <form id="pin-form">

        <div class="form-group">
          <label for="pin-name">
            장소명
          </label>

          <input
            type="text"
            id="pin-name"
            placeholder="예: 나카노시마 신사"
            required
          >
        </div>

        <div class="form-group">
          <label for="pin-color">
            핀 색상
          </label>

          <div class="color-row">
            <select id="pin-color">
              <option value="#dc2626">
                빨간색 · 음식점
              </option>

              <option value="#d97706">
                주황색 · 카페
              </option>

              <option value="#2563eb">
                파란색 · 관광
              </option>

              <option value="#7c3aed">
                보라색 · 숙소
              </option>

              <option value="#db2777">
                분홍색 · 쇼핑
              </option>

              <option value="#16a34a">
                초록색 · 공원
              </option>

              <option value="#0f766e">
                청록색 · 기타
              </option>

              <option value="#111827">
                검정색
              </option>
            </select>

            <div
              id="color-preview"
              class="color-preview"
              aria-label="선택한 핀 색상"
            ></div>
          </div>
        </div>

        <div class="form-group">
          <label for="pin-google">
            긴 구글 지도 링크 또는 위도·경도
          </label>

          <input
            type="text"
            id="pin-google"
            placeholder="google.com/maps/... 또는 43.0375, 141.3612"
            required
          >
        </div>

        <div class="form-group">
          <label for="pin-notion">
            노션 토글 또는 블록 링크
          </label>

          <input
            type="url"
            id="pin-notion"
            placeholder="선택사항: https://www.notion.so/..."
          >
        </div>

        <div class="button-row">
          <button
            type="submit"
            class="submit-btn"
          >
            지도에 핀 추가
          </button>

          <button
            type="button"
            id="clear-all-btn"
            class="clear-btn"
          >
            전체 핀 삭제
          </button>
        </div>
      </form>

      <div class="guide">
        <strong>구글 지도 링크 사용 방법</strong><br>
        `maps.app.goo.gl` 짧은 링크는 좌표를 바로 읽기 어렵습니다.
        크롬에서 링크를 연 다음 주소창의 긴
        `google.com/maps/...` 주소를 복사하세요.<br><br>

        지도는 나카노시마역 반경 2km에 맞춰 고정되어 있습니다.
        범위 밖의 장소를 입력하면 추가 전 확인창이 나타납니다.
      </div>

      <div
        id="pin-count"
        class="pin-count"
      >
        저장된 핀 0개
      </div>
    </section>

    <!-- 색상 범례 -->
    <div class="legend">
      <span class="legend-item">
        <span
          class="legend-dot"
          style="background:#dc2626;"
        ></span>
        음식점
      </span>

      <span class="legend-item">
        <span
          class="legend-dot"
          style="background:#d97706;"
        ></span>
        카페
      </span>

      <span class="legend-item">
        <span
          class="legend-dot"
          style="background:#2563eb;"
        ></span>
        관광
      </span>

      <span class="legend-item">
        <span
          class="legend-dot"
          style="background:#7c3aed;"
        ></span>
        숙소
      </span>

      <span class="legend-item">
        <span
          class="legend-dot"
          style="background:#db2777;"
        ></span>
        쇼핑
      </span>

      <span class="legend-item">
        <span
          class="legend-dot"
          style="background:#16a34a;"
        ></span>
        공원
      </span>
    </div>

    <!-- 지도 -->
    <div id="map"></div>
  </main>

  <!-- Leaflet 지도 JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  ></script>

  <script>
    /*
      ==================================================
      1. 나카노시마역 중심 및 반경
      ==================================================
    */

    const nakanoshimaStation = {
      lat: 43.03755,
      lng: 141.36115
    };

    const radiusMeters = 2000;

    /*
      ==================================================
      2. 지도 생성
      ==================================================
    */

    const map = L.map("map", {
      zoomControl: false,
      dragging: false,
      scrollWheelZoom: false,
      doubleClickZoom: false,
      touchZoom: false,
      boxZoom: false,
      keyboard: false,
      attributionControl: true
    });

    const mapTiles = L.tileLayer(
  "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
  {
    subdomains: ["a", "b", "c"],
    minZoom: 1,
    maxZoom: 19,
    tileSize: 256,
    crossOrigin: true,
    attribution:
      '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
  }
);

mapTiles.addTo(map);

    /*
      반경 2km 원을 기준으로 지도 범위 자동 설정
    */
    const radiusCircle = L.circle(
      [
        nakanoshimaStation.lat,
        nakanoshimaStation.lng
      ],
      {
        radius: radiusMeters,
        color: "#2563eb",
        weight: 2,
        opacity: 0.7,
        fillColor: "#2563eb",
        fillOpacity: 0.035,
        dashArray: "8, 8",
        interactive: false
      }
    ).addTo(map);

    map.fitBounds(
      radiusCircle.getBounds(),
      {
        padding: [25, 25]
      }
    );

    /*
      나카노시마역 기준 핀
    */
    const stationIcon = L.divIcon({
      className: "station-pin-wrapper",

      html: `
        <div class="station-pin">
          역
        </div>
      `,

      iconSize: [38, 38],
      iconAnchor: [19, 19],
      popupAnchor: [0, -20]
    });

    const stationMarker = L.marker(
      [
        nakanoshimaStation.lat,
        nakanoshimaStation.lng
      ],
      {
        icon: stationIcon,
        title: "나카노시마역",
        zIndexOffset: 1000
      }
    ).addTo(map);

    stationMarker.bindTooltip(
      "나카노시마역",
      {
        permanent: true,
        direction: "right",
        offset: [22, 0],
        className: "station-label",
        opacity: 1
      }
    );

    stationMarker.bindPopup(`
      <div class="popup-box">
        <div class="popup-title">
          나카노시마역
        </div>

        <div class="popup-distance">
          여행 지도의 기준 위치
        </div>

        <a
          href="https://www.google.com/maps/search/?api=1&query=43.03755,141.36115"
          target="_blank"
          rel="noopener noreferrer"
          class="popup-link google-btn"
        >
          구글 지도에서 열기
        </a>
      </div>
    `);

    /*
      ==================================================
      3. 핀 아이콘 및 공통 함수
      ==================================================
    */

    function createPinIcon(color) {
      const safeColor =
        /^#[0-9a-fA-F]{6}$/.test(color)
          ? color
          : "#0f766e";

      return L.divIcon({
        className: "custom-pin-wrapper",

        html: `
          <div
            class="custom-pin"
            style="background:${safeColor};"
          >
            <span>●</span>
          </div>
        `,

        iconSize: [34, 34],
        iconAnchor: [17, 34],
        popupAnchor: [0, -34]
      });
    }

    function escapeHtml(text) {
      return String(text ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    /*
      구글 지도 URL 또는 좌표에서
      위도·경도 추출
    */
    function extractCoordinates(inputValue) {
      let decodedValue =
        inputValue.trim();

      try {
        decodedValue =
          decodeURIComponent(decodedValue);
      } catch (error) {
        console.warn(
          "URL 디코딩을 건너뜁니다.",
          error
        );
      }

      const patterns = [
        /@(-?\d+(?:\.\d+)?),\s*(-?\d+(?:\.\d+)?)/,

        /!3d(-?\d+(?:\.\d+)?).*?!4d(-?\d+(?:\.\d+)?)/,

        /[?&]q=(-?\d+(?:\.\d+)?),\s*(-?\d+(?:\.\d+)?)/,

        /[?&]query=(-?\d+(?:\.\d+)?),\s*(-?\d+(?:\.\d+)?)/,

        /^(-?\d+(?:\.\d+)?),\s*(-?\d+(?:\.\d+)?)$/
      ];

      for (const pattern of patterns) {
        const match =
          decodedValue.match(pattern);

        if (!match) {
          continue;
        }

        const lat =
          Number.parseFloat(match[1]);

        const lng =
          Number.parseFloat(match[2]);

        if (
          Number.isFinite(lat) &&
          Number.isFinite(lng) &&
          lat >= -90 &&
          lat <= 90 &&
          lng >= -180 &&
          lng <= 180
        ) {
          return {
            lat: lat,
            lng: lng
          };
        }
      }

      return null;
    }

    /*
      나카노시마역에서 해당 장소까지
      직선거리 계산
    */
    function getDistanceFromStation(lat, lng) {
      return map.distance(
        [
          nakanoshimaStation.lat,
          nakanoshimaStation.lng
        ],
        [lat, lng]
      );
    }

    function formatDistance(distanceMeters) {
      if (distanceMeters < 1000) {
        return `${Math.round(distanceMeters)}m`;
      }

      return `${(
        distanceMeters / 1000
      ).toFixed(1)}km`;
    }

    /*
      ==================================================
      4. 브라우저 저장
      ==================================================
    */

    const storageKey =
      "nakanoshimaTravelPinsV1";

    function savePins(pins) {
      localStorage.setItem(
        storageKey,
        JSON.stringify(pins)
      );

      updatePinCount();
    }

    function loadPins() {
      const savedPins =
        localStorage.getItem(storageKey);

      if (!savedPins) {
        return [];
      }

      try {
        const parsedPins =
          JSON.parse(savedPins);

        return Array.isArray(parsedPins)
          ? parsedPins
          : [];
      } catch (error) {
        console.error(
          "저장된 핀을 불러오지 못했습니다.",
          error
        );

        return [];
      }
    }

    function updatePinCount() {
      const pinCount =
        loadPins().length;

      document
        .getElementById("pin-count")
        .textContent =
          `저장된 핀 ${pinCount}개`;
    }

    /*
      ==================================================
      5. 지도 마커 생성
      ==================================================
    */

    const markerMap = new Map();

    function createMarker(pin) {
      const pinColor =
        pin.color || "#0f766e";

      const marker = L.marker(
        [pin.lat, pin.lng],
        {
          icon: createPinIcon(pinColor),
          title: pin.name
        }
      ).addTo(map);

      /*
        장소명을 항상 표시
      */
      marker.bindTooltip(
        escapeHtml(pin.name),
        {
          permanent: true,
          direction: "right",
          offset: [16, -16],
          className: "place-name-label",
          opacity: 1
        }
      );

      const safeName =
        escapeHtml(pin.name);

      const safeGoogleUrl =
        escapeHtml(pin.googleUrl);

      const safeNotionUrl =
        escapeHtml(pin.notionUrl);

      const safeColor =
        /^#[0-9a-fA-F]{6}$/.test(pinColor)
          ? pinColor
          : "#0f766e";

      const distance =
        getDistanceFromStation(
          pin.lat,
          pin.lng
        );

      const notionButton =
        safeNotionUrl
          ? `
            <a
              href="${safeNotionUrl}"
              target="_blank"
              rel="noopener noreferrer"
              class="popup-link notion-btn"
            >
              노션 설명으로 이동
            </a>
          `
          : "";

      marker.bindPopup(`
        <div class="popup-box">
          <div class="popup-title">
            ${safeName}
          </div>

          <div class="popup-color">
            <span
              class="popup-color-dot"
              style="background:${safeColor};"
            ></span>

            선택한 핀 색상
          </div>

          <div class="popup-distance">
            나카노시마역에서 직선거리
            <strong>
              ${formatDistance(distance)}
            </strong>
          </div>

          <div class="popup-coords">
            ${pin.lat}, ${pin.lng}
          </div>

          <a
            href="${safeGoogleUrl}"
            target="_blank"
            rel="noopener noreferrer"
            class="popup-link google-btn"
          >
            구글 지도에서 열기
          </a>

          ${notionButton}

          <button
            type="button"
            class="delete-btn"
            onclick="deletePin('${pin.id}')"
          >
            🗑️ 이 핀 삭제
          </button>
        </div>
      `);

      markerMap.set(
        pin.id,
        marker
      );

      return marker;
    }

    /*
      ==================================================
      6. 핀 삭제
      ==================================================
    */

    window.deletePin = function(pinId) {
      const savedPins =
        loadPins();

      const targetPin =
        savedPins.find(
          (pin) => pin.id === pinId
        );

      const pinName =
        targetPin?.name || "이 핀";

      const shouldDelete =
        window.confirm(
          `"${pinName}" 핀을 삭제할까요?`
        );

      if (!shouldDelete) {
        return;
      }

      const updatedPins =
        savedPins.filter(
          (pin) => pin.id !== pinId
        );

      savePins(updatedPins);

      const marker =
        markerMap.get(pinId);

      if (marker) {
        map.closePopup();
        map.removeLayer(marker);
        markerMap.delete(pinId);
      }
    };

    /*
      모든 핀 삭제
    */
    document
      .getElementById("clear-all-btn")
      .addEventListener(
        "click",
        function() {
          const savedPins =
            loadPins();

          if (savedPins.length === 0) {
            alert(
              "삭제할 핀이 없습니다."
            );

            return;
          }

          const shouldDeleteAll =
            window.confirm(
              `저장된 핀 ${savedPins.length}개를 모두 삭제할까요?\n이 작업은 되돌릴 수 없습니다.`
            );

          if (!shouldDeleteAll) {
            return;
          }

          markerMap.forEach(
            (marker) => {
              map.removeLayer(marker);
            }
          );

          markerMap.clear();

          savePins([]);

          map.closePopup();

          alert(
            "모든 핀이 삭제되었습니다."
          );
        }
      );

    /*
      ==================================================
      7. 저장된 핀 불러오기
      ==================================================
    */

    const existingPins =
      loadPins();

    existingPins.forEach(
      (pin) => {
        createMarker(pin);
      }
    );

    updatePinCount();

    /*
      ==================================================
      8. 색상 미리보기
      ==================================================
    */

    const colorSelect =
      document.getElementById(
        "pin-color"
      );

    const colorPreview =
      document.getElementById(
        "color-preview"
      );

    function updateColorPreview() {
      colorPreview.style.background =
        colorSelect.value;
    }

    colorSelect.addEventListener(
      "change",
      updateColorPreview
    );

    updateColorPreview();

    /*
      ==================================================
      9. 핀 추가 폼
      ==================================================
    */

    document
      .getElementById("pin-form")
      .addEventListener(
        "submit",
        function(event) {
          event.preventDefault();

          const name =
            document
              .getElementById("pin-name")
              .value
              .trim();

          const color =
            colorSelect.value;

          const googleUrl =
            document
              .getElementById("pin-google")
              .value
              .trim();

          const notionUrl =
            document
              .getElementById("pin-notion")
              .value
              .trim();

          const coordinates =
            extractCoordinates(
              googleUrl
            );

          if (!coordinates) {
            if (
              googleUrl.includes(
                "maps.app.goo.gl"
              )
            ) {
              alert(
                "구글 지도 앱의 짧은 링크에서는 좌표를 읽을 수 없습니다.\n\n" +
                "1. 링크를 크롬에서 여세요.\n" +
                "2. 장소가 열린 뒤 주소창의 긴 google.com/maps 주소를 복사하세요.\n" +
                "3. 그 주소를 다시 입력해주세요."
              );
            } else {
              alert(
                "링크에서 위도와 경도를 찾지 못했습니다.\n\n" +
                "긴 구글 지도 주소 또는\n" +
                "43.0375, 141.3612 형식의 좌표를 입력해주세요."
              );
            }

            return;
          }

          const lat =
            coordinates.lat;

          const lng =
            coordinates.lng;

          const distance =
            getDistanceFromStation(
              lat,
              lng
            );

          /*
            반경 2km 바깥이면 확인
          */
          if (distance > radiusMeters) {
            const continueAnyway =
              window.confirm(
                `이 장소는 나카노시마역에서 직선거리 ${formatDistance(distance)} 떨어져 있습니다.\n\n` +
                "반경 2km 범위 밖이라 지도 화면에 보이지 않을 수 있습니다.\n그래도 추가할까요?"
              );

            if (!continueAnyway) {
              return;
            }
          }

          const newPin = {
            id:
              Date.now().toString() +
              "-" +
              Math.random()
                .toString(16)
                .slice(2),

            name: name,
            color: color,
            googleUrl: googleUrl,
            notionUrl: notionUrl,
            lat: lat,
            lng: lng
          };

          const savedPins =
            loadPins();

          savedPins.push(newPin);

          savePins(savedPins);

          const newMarker =
            createMarker(newPin);

          newMarker.openPopup();

          /*
            입력 폼 초기화
          */
          this.reset();

          colorSelect.value =
            "#dc2626";

          updateColorPreview();
        }
      );
  </script>
</body>
</html>
